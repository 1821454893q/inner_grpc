syntax = "proto3";

option go_package = "./;inner_grpc";

// 枚举

// 内部API接口定义
service AssetGoeInner {
  rpc Rewards (RewardGrantRequest) returns (RewardGrantResponse) {} // 记录IP切换日志
}

// 奖励发放请求
message RewardGrantRequest {
  string bid = 1; // 业务标识
  string uid = 2; // 用户ID
  int32 aid = 3; // 存档ID
  map<string, int64> rewards = 4; // 奖励信息
}

// 奖励发放响应
message RewardGrantResponse {
  map<string, int64> updates = 1; //更新后的资产信息
}